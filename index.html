<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

</head>

  <body>
    <main class="newsletter-container" id="newsletterContainer">
      <div class="newsletter__img">
        <picture>
          <source media="(min-width: 1200px)" srcset="assets/images/illustration-sign-up-desktop.svg">
          <source media="(min-width: 500px)" srcset="assets/images/illustration-sign-up-tablet.svg">
          <img src="assets/images/illustration-sign-up-mobile.svg" alt=" abstract illustration for newsletter sign up">
        </picture>
      </div>
      <div class="newsletter__body">
        <h1 class="newsletter__title">Stay updated!</h1>
        <p class="newsletter__text">Join 60,000+ product managers receiving monthly updates on:</p>
        <ul class="newsletter__list">
          <li class="newsletter__list-item"><p>Product discovery and building what matters</p></li>
          <li class="newsletter__list-item"><p>Measuring to ensure updates are a success</p></li>
          <li class="newsletter__list-item"><p>And much more!</p></li>
        </ul>
        <form class="newsletter__form" id="form" novalidate>
          <div class="input-header">
          <label for="email"><p>Email address</p></label>
          <span class="error-message">Valid email required</span>
          </div>
          <input type="email" id="email" name="email" class="newsletter__input" placeholder="email@company.com" required><br>
          <button type="submit" class="newsletter__submit" id="submit"><p>Subscribe to monthly newsletter</p>
          </button>
        </form>
      </div>
    </main>
    
      <div class="success-message__popup__container" id="successMessagePopupContainer">
      <div class="success-message__popup" id="successMsgPopup">
        <div class="success-message__popup-body">
          <img src="assets/images/icon-list.svg" alt="Check Logo">
          <h1>Thanks for subscribing!</h1>
          <p id="conformationMsg"></p>
        </div>
        <button type="submit" id="dismissBtn"><p>Dismiss Message</p></button>
      </div>
      </div>
  <script src="script.js"></script>
 </body>
</html>
